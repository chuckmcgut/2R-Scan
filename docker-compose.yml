version: "3.9"

services:
  server:
    build:
      context: .
      dockerfile: Dockerfile
    image: 2r-scan:latest
    container_name: 2r-scan
    restart: unless-stopped
    ports:
      - "${PORT:-8080}:8080"
    environment:
      - PORT=${PORT:-8080}
      - DATABASE_URL=${DATABASE_URL:-/cards.db}
      - SCAN_DIR=${SCAN_DIR:-/tmp/scans}
      - RATE_LIMIT=${RATE_LIMIT:-10}
      - RATE_WINDOW=${RATE_WINDOW:-60}
    volumes:
      - ${DATA_DIR:-./data}:/tmp/scans
      - ${DB_DIR:-.}:/cards.db:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M